name: Matrix

on:
  workflow_dispatch:

jobs:
  Linting:
    strategy:
      fail-fast: true
      matrix:
        go-version: ['1.22', '1.23', '1.24']

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Conde
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Go Formatter
        run: go fmt
        working-directory: backend

      - name: Go Vet
        run: go vet
        working-directory: backend