# Goal : i have to Lint,Build,Test the code for Frontend and Backend 
# and then push the images to dockerHub...

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v7

      - name: Setup Nodejs
        uses: actions/Setup-node@v6
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
        
      - name: Install npm packages
        run: npm install
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker build and push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/devboard-fe-advanced:latest


  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
        #go-version-file: 'go.mod'
          cache: true

      - name: Go Formatter
        run: go fmt
        working-directory: backend


      - name: Go Vet
        run: go vet
        working-directory: backend

      - name: Run Test
        run: go test
        working-directory: backend

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: Dockerfile
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/devboard-be-advanced:latest



 
 