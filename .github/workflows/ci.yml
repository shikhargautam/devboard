# Goal : i have to Lint,Build,Test the code for Frontend and Backend 
# and then push the images to dockerHub...

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v7

      - name: Setup Nodejs
        uses: actions/Setup-node@v6
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
        
      - name: Install npm packages
        run: npm install
        working-directory: frontend

      - name: Run Linter
        run: npm run lint
        working-directory: frontend

      - name: Run Tests
        run: npm run test
        working-directory: frontend

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker build and push
         uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/devboard-fe-advanced:latest


 
 