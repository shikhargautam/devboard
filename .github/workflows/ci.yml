# Goal : i have to Lint,Build,Test the code for Frontend and Backend 
# and then push the images to dockerHub...

name: CI

on:
  push:
    branches: [advanced]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/Checkout@v7

      - name: Setup Nodejs
        uses: actions/Setup-node@v6
        with: 
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend\package.json
        
      - name: Install npm packages
        run: npm install

      - name: Run Linter
        run: npm run Lint

      - name: Run Tests
        run: npm run test


 
 